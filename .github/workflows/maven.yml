# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B verify --file pom.xml
    - name: Build Docker image
      run: docker build . --tag zombief0/couture:${{ github.sha }}

    - name: push Docker image
      run: |
        echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u zombief0  --password-stdin
        docker push zombief0/couture:${{ github.sha }}
    - name: Run docker image
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        password: ${{ secrets.PASSWORD }}
        port: ${{ secrets.PORT }}
        script: |
          docker stop couture || true
          docker rm couture || true
          docker image prune -a -f
          docker run -v /data/couture/config:/springconfig -e VIRTUAL_HOST=couture-api.normanmbouende.fr -e LETSENCRYPT_HOST=couture-api.normanmbouende.fr -e VIRTUAL_PORT=8080 --name couture -d zombief0/couture:${{ github.sha }}
